<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nachman's Coupons</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#277DA1">
    
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/1773329525333-512.png" />

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" />

  <style>
    body { margin: 0; font-family: Roboto, sans-serif; }
    .material-icons-outlined { font-family: 'Material Icons Outlined'; font-size: 24px; vertical-align: middle; }
    .status-icon { width: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .row-wrapper { display: flex; align-items: stretch; gap: 8px; }
    .clickable-card { cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 17 -->
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>

  <!-- Material-UI v4 Core -->
  <script src="https://unpkg.com/@material-ui/core@4.12.4/umd/material-ui.development.js"></script>

  <script>
    const {
      Container, Paper, Typography, TextField, Button, Grid, Card, CardContent,
      IconButton, Switch, FormControlLabel, Box, CssBaseline, Fab, ThemeProvider,
      createMuiTheme, Dialog, DialogTitle, DialogContent, DialogActions
    } = MaterialUI;

    const STORAGE_KEY = "couponManagerDataReact_v4";
    const THEME_KEY = "couponManagerThemeMode";
    const UNUSED_GRAY = "rgb(97, 98, 95)";

    function loadCoupons() {
      try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }
      catch { return []; }
    }

    function saveCoupons(coupons) { localStorage.setItem(STORAGE_KEY, JSON.stringify(coupons)); }

    function getStatus(coupon) {
      if (coupon.used) return { type: "used", bg: "rgba(144, 190, 109, 0.45)", icon: "check_circle", iconColor: "#177818" };
      if (!coupon.dueDate) return { type: "normal", bg: "", icon: "", iconColor: "" };
      const today = new Date();
      const due = new Date(coupon.dueDate);
      const diffDays = Math.ceil((due - today) / (1000*60*60*24));
      if (diffDays < 0) return { type: "expired", bg: "rgba(200,0,0,0.5)", icon: "cancel", iconColor: "#C1121F" };
      if (diffDays <= 30) return { type: "soon", bg: "rgba(249,220,92,0.7)", icon: "warning_amber", iconColor: "#F8961E" };
      return { type: "normal", bg: "", icon: "", iconColor: "" };
    }

    function isExpired(coupon) {
      if (!coupon.dueDate) return false;
      return new Date(coupon.dueDate) - new Date() < 0;
    }
	function handleShareWhatsApp(coupon) {

  const dueDate = coupon.dueDate
    ? new Date(coupon.dueDate).toLocaleDateString("en-GB")
    : "-";

  const text =
`🎟 Coupon: ${coupon.name}
📅 Due: ${dueDate}
${coupon.code ? "🔑 Code: " + coupon.code : ""}

Shared from Nachman's Coupons`;

  const url = "https://wa.me/?text=" + encodeURIComponent(text);

  window.open(url, "_blank");
}

    function App() {
      const [coupons, setCoupons] = React.useState(loadCoupons());
      const [showRelevantOnly, setShowRelevantOnly] = React.useState(false);
      const [search, setSearch] = React.useState("");
      const [sortBy, setSortBy] = React.useState("none");
      const [dialogOpen, setDialogOpen] = React.useState(false);
      const [selectedCoupon, setSelectedCoupon] = React.useState(null);

      const [addDialogOpen, setAddDialogOpen] = React.useState(false);
      const [name, setName] = React.useState("");
      const [code, setCode] = React.useState("");
      const [orderedBy, setOrderedBy] = React.useState("");
      const [dueDate, setDueDate] = React.useState("");
      const [description, setDescription] = React.useState("");

      React.useEffect(() => saveCoupons(coupons), [coupons]);

      function handleAdd(e) {
        e.preventDefault();
        if (!name.trim() || !code.trim()) return;
        const newCoupon = {
          id: Date.now(), name: name.trim(), code: code.trim(),
          orderedBy: orderedBy.trim(), dueDate, description: description.trim(),
          used: false
        };
        setCoupons(prev => [...prev, newCoupon]);
        setName(""); setCode(""); setOrderedBy(""); setDueDate(""); setDescription("");
      }

      function handleMarkUsed(id, e) { e.stopPropagation(); if (!confirm("Mark this coupon as used?")) return; setCoupons(prev => prev.map(c => c.id===id?{...c,used:true}:c)); }
      function handleMarkUnused(id, e) { e.stopPropagation(); if (!confirm("Mark this coupon as unused?")) return; setCoupons(prev => prev.map(c => c.id===id?{...c,used:false}:c)); }
      function handleDelete(id, e) { e.stopPropagation(); if (!confirm("Delete this coupon?")) return; setCoupons(prev => prev.filter(c=>c.id!==id)); }
      function openDetails(coupon) { setSelectedCoupon(coupon); setDialogOpen(true); }
      function closeDetails() { setDialogOpen(false); setSelectedCoupon(null); }
	  function handleExport() {
  const dataStr = JSON.stringify(coupons, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "coupons.json";
  a.click();
  URL.revokeObjectURL(url);
}

function handleImport() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json";
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const imported = JSON.parse(evt.target.result);
        if (Array.isArray(imported)) setCoupons(imported);
        else alert("Invalid file format");
      } catch {
        alert("Failed to read JSON");
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

      // filter + search + sort
      let filteredCoupons = coupons.slice();
      if (showRelevantOnly) filteredCoupons = filteredCoupons.filter(c => !c.used && !isExpired(c));
      if (search.trim()) { const q = search.toLowerCase(); filteredCoupons = filteredCoupons.filter(c => (c.name||"").toLowerCase().includes(q) || (c.code||"").toLowerCase().includes(q)); }
      if (sortBy === "name") {
  filteredCoupons.sort((a, b) => (a.name||"").localeCompare(b.name||"", undefined, {sensitivity:"base"}));
}

if (sortBy === "dueDate") {
  filteredCoupons.sort((a,b)=>{
    if(!a.dueDate && !b.dueDate) return 0;
    if(!a.dueDate) return 1;
    if(!b.dueDate) return -1;
    return new Date(a.dueDate) - new Date(b.dueDate);
  });
}

// NEW: relevant sorting (soonest due first, remove used & expired)
if (sortBy === "relevant") {
  // Keep only not used AND due date exists (so we can sort)
  filteredCoupons = filteredCoupons.filter(c => !c.used && c.dueDate);

  // Sort by due date, soonest first
  filteredCoupons.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
}
      return React.createElement(Container, { maxWidth: "lg", style: { padding: "32px 16px" } },
        React.createElement(Paper, { elevation: 3, style: { padding: 24 } },

         /* TOP BANNER + CONTROLS */
React.createElement(Box, { style: { width: "100%", marginBottom: 24 } },

  // Banner with image and title
  React.createElement(Box, { style: { position: "relative", width: "100%", height: 150, marginBottom: 16 } },
    React.createElement("img", {
      src: "icons/banner.png",
      alt: "Banner",
      style: { width: "100%", height: "100%", objectFit: "cover", borderRadius: 8 }
    }),
    
  ),

  // Controls: Search + Sort + Import/Export buttons
  React.createElement(Grid, { container: true, spacing: 2, alignItems: "center" },
    
    // Search field
    React.createElement(Grid, { item: true, xs: 12, sm: 5 },
      React.createElement(TextField, {
        label: "Search by name or code",
        value: search,
        onChange: e => setSearch(e.target.value),
        fullWidth: true
      })
    ),

    // Sort field
    React.createElement(Grid, { item: true, xs: 12, sm: 4 },
      React.createElement(TextField, {
        select: true,
        SelectProps: { native: true },
        label: "Sort by",
        value: sortBy,
        onChange: e => setSortBy(e.target.value),
        variant: "outlined",
        size: "small",
        fullWidth: true
      },
        React.createElement("option", { value: "none" }, "None"),
        React.createElement("option", { value: "name" }, "Name"),
        React.createElement("option", { value: "dueDate" }, "Due date (closest first)"),
        React.createElement("option", { value: "relevant" }, "By relevant")
      )
    ),

    // Import/Export buttons
    React.createElement(Grid, { item: true, xs: 12, sm: 3, style: { display: "flex", gap: 8 } },
      React.createElement(Button, {
        size: "small",
        variant: "outlined",
        color: "primary",
        onClick: handleExport,
        startIcon: React.createElement("span", { className: "material-icons-outlined" }, "download")
      }, "Download"),
      React.createElement(Button, {
        size: "small",
        variant: "outlined",
        color: "primary",
        onClick: handleImport,
        startIcon: React.createElement("span", { className: "material-icons-outlined" }, "upload_file")
      }, "Import")
    )
  )
),

/* LIST */
filteredCoupons.length === 0
  ? React.createElement(Typography,{
      variant:"body2",
      color:"textSecondary",
      style:{textAlign:"center", padding:"32px 0"}
    },"No coupons yet.")
  : React.createElement(Grid,{container:true, spacing:2},
      filteredCoupons.map(coupon=>{
        const status = getStatus(coupon);

        return React.createElement(Grid,{item:true, xs:12, key:coupon.id},

          React.createElement(Card,{
            variant:"outlined",
            className:"clickable-card",
            onClick:()=>openDetails(coupon),
            style:{
              width:"100%",
              background:status.bg || "rgba(113, 162, 182,0.5)",
              padding:8,
              borderRadius:10
            }
          },

            React.createElement(CardContent,{style:{paddingBottom:8}},

              React.createElement("div",{
                style:{
                  display:"flex",
                  justifyContent:"space-between",
                  alignItems:"flex-start"
                }
              },

                /* LEFT COLUMN (BUTTONS ONLY) */
                React.createElement("div",{
                  style:{
                    display:"flex",
                    gap:"4px"
                  }
                },
									React.createElement(IconButton,{
                    style:{color:"#C1121F"},
                    onClick:e=>handleDelete(coupon.id,e)
                  },
                    React.createElement("span",{className:"material-icons-outlined"},"delete_outline")
                  ),

                  !coupon.used
                    ? React.createElement(IconButton,{
                        style:{color:UNUSED_GRAY},
                        onClick:e=>handleMarkUsed(coupon.id,e)
                      },
                        React.createElement("span",{className:"material-icons-outlined"},"check_circle_outline")
                      )
                    : React.createElement(IconButton,{
                        style:{color:"#177818"},
                        onClick:e=>handleMarkUnused(coupon.id,e)
                      },
                        React.createElement("span",{className:"material-icons-outlined"},"check_circle")
                      ),

                  

                ),

                /* RIGHT COLUMN (TEXT) */
                React.createElement("div",{style:{textAlign:"right"}},

                  React.createElement(Typography,{
                    variant:"subtitle1",
                    style:{fontWeight:600}
                  },coupon.name),

                  React.createElement(Typography,{variant:"body2"},
                    coupon.dueDate
                      ? new Date(coupon.dueDate).toLocaleDateString("en-GB")
                      : "-"
                  )

                )

              )

            )

          )

        );
      })
    ),

          /* DETAILS DIALOG */
React.createElement(Dialog, {
  open: dialogOpen,
  onClose: closeDetails,
  fullWidth: true,
  maxWidth: "sm",
  PaperProps: { style: { borderRadius: 20 } }
},
  selectedCoupon && React.createElement(Box, null,
    // --- Header with title and buttons ---
    React.createElement(Box, {
      style: {
        background: getStatus(selectedCoupon).bg || "rgba(113, 162, 182, 0.5)",
        padding: "20px 24px",
        borderTopLeftRadius: 20,
        borderTopRightRadius: 20,
        borderBottom: "1px solid rgba(0,0,0,0.12)",
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center"
      }
    },
      React.createElement(Typography, { variant: "h6", color: "textSecondary", style: { fontWeight: 600 } }, selectedCoupon.name),
      React.createElement("div", { style: { display: "flex", gap: "8px" } },
        // Close button
        React.createElement(IconButton, { onClick: closeDetails },
          React.createElement("span", { className: "material-icons-outlined" }, "close")
        ),
        // WhatsApp SHARE button
        React.createElement(Button, {
          variant: "outlined",
          style: {
            color: "#25D366",
            borderColor: "#25D366",
            textTransform: "none",
            display: "flex",
            alignItems: "center",
            gap: 4
          },
          onClick: () => handleShareWhatsApp(selectedCoupon)
        },
          React.createElement("img", { src: "icons/whatsapp.png", style: { width: 20, height: 20 } }),
          "SHARE"
        )
      )
    ),

    // --- Dialog Content ---
    React.createElement(DialogContent, null,
      React.createElement(Box, { style: { marginBottom: 24 } },
        React.createElement(Typography, { variant: "overline", color: "textSecondary" }, "CODE"),
        React.createElement(Paper, { variant: "outlined", style: { padding: "8px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 6 } },
          React.createElement(Typography, { variant: "h6", color: "textPrimary", style: { letterSpacing: 1, fontWeight: 500 } }, selectedCoupon.code),
          React.createElement(IconButton, { onClick: () => { navigator.clipboard.writeText(selectedCoupon.code); alert("Code copied!"); }, size: "small" },
            React.createElement("span", { className: "material-icons-outlined" }, "content_copy")
          )
        )
      ),
      React.createElement(Grid, { container: true, spacing: 3 },
        React.createElement(Grid, { item: true, xs: 6 },
          React.createElement(Typography, { variant: "overline", color: "textSecondary" }, "ORDERED BY"),
          React.createElement(Typography, { variant: "body1" }, selectedCoupon.orderedBy || "-")
        ),
        React.createElement(Grid, { item: true, xs: 6 },
          React.createElement(Typography, { variant: "overline", color: "textSecondary" }, "DUE DATE"),
          React.createElement(Typography, { variant: "body1" }, selectedCoupon.dueDate || "-")
        )
      ),
      React.createElement(Box, { style: { marginTop: 28 } },
        React.createElement(Typography, { variant: "overline", color: "textSecondary" }, "DESCRIPTION"),
        React.createElement(Paper, { variant: "outlined", style: { padding: 16, marginTop: 6 } },
          React.createElement(Typography, { variant: "body2" }, selectedCoupon.description || "No description")
        )
      )
    )

  )
),

          /* ADD COUPON DIALOG */
          React.createElement(Dialog, { open: addDialogOpen, onClose:()=>setAddDialogOpen(false), fullWidth:true, maxWidth:"sm", PaperProps:{style:{borderRadius:20}}},
            React.createElement(DialogTitle,null,"Add New Coupon"),
            React.createElement(DialogContent,null,
              React.createElement(Box,{component:"form", onSubmit:(e)=>{handleAdd(e); setAddDialogOpen(false);}},
                React.createElement(Grid,{container:true, spacing:2},
                  React.createElement(Grid,{item:true, xs:12, sm:6},React.createElement(TextField,{label:"Name", value:name, onChange:e=>setName(e.target.value), fullWidth:true, required:true})),
                  React.createElement(Grid,{item:true, xs:12, sm:6},React.createElement(TextField,{label:"Code", value:code, onChange:e=>setCode(e.target.value), fullWidth:true, required:true})),
                  React.createElement(Grid,{item:true, xs:12, sm:6},React.createElement(TextField,{label:"Who ordered it", value:orderedBy, onChange:e=>setOrderedBy(e.target.value), fullWidth:true})),
                  React.createElement(Grid,{item:true, xs:12, sm:6},React.createElement(TextField,{label:"Due date", type:"date", value:dueDate, onChange:e=>setDueDate(e.target.value), fullWidth:true, InputLabelProps:{shrink:true}, required:true})),
                  React.createElement(Grid,{item:true, xs:12},React.createElement(TextField,{label:"Description", value:description, onChange:e=>setDescription(e.target.value), fullWidth:true, multiline:true, minRows:2}))
                )
              )
            ),
            React.createElement(DialogActions,null,
              React.createElement(Button,{onClick:()=>setAddDialogOpen(false), color:"primary"},"Cancel"),
              React.createElement(Button,{onClick:(e)=>{handleAdd(e); setAddDialogOpen(false);}, color:"primary", variant:"contained"},"Add")
            )
          ),

          /* FLOATING + BUTTON */
          React.createElement(Fab,{color:"primary", onClick:()=>setAddDialogOpen(true), style:{position:"fixed", top:16, right:16}},
            React.createElement("span",{className:"material-icons-outlined"},"add")
          )
        )
      );
    }

    function ThemeRoot() {
      const [themeMode, setThemeMode] = React.useState(()=>localStorage.getItem(THEME_KEY) || "system");
      const [systemDark, setSystemDark] = React.useState(window.matchMedia("(prefers-color-scheme: dark)").matches);

      React.useEffect(()=>{ const mq=window.matchMedia("(prefers-color-scheme: dark)"); const handler=e=>setSystemDark(e.matches); mq.addListener(handler); return ()=>mq.removeListener(handler); }, []);
      React.useEffect(()=>localStorage.setItem(THEME_KEY, themeMode), [themeMode]);

      const effectiveMode = themeMode==="system" ? (systemDark? "dark":"light") : themeMode;
      const theme = createMuiTheme({ palette: { type: effectiveMode, primary:{main:"#277DA1"}, secondary:{main:"#F3722C"} } });
      const iconName = themeMode==="system"? "brightness_auto": themeMode==="light"?"light_mode":"dark_mode";

      return React.createElement(ThemeProvider,{theme},
        React.createElement(CssBaseline,null),
        React.createElement(App,null),
        React.createElement(Fab,{color:"primary", onClick:()=>setThemeMode(prev=>prev==="system"?"light":prev==="light"?"dark":"system"), style:{position:"fixed", bottom:16, right:16}},
          React.createElement("span",{className:"material-icons-outlined"}, iconName)
        )
      );
    }

    ReactDOM.render(React.createElement(ThemeRoot,null), document.getElementById("root"));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(()=>console.log("Service Worker registered"));
    }
  </script>
</body>
</html>
